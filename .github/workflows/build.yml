name: Build Browser Launcher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 手动触发

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download dependencies
        run: go mod download

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.9.1

      - name: Build
        run: wails build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/bin/browser-launcher.exe

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04  # GLIBC 2.31
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Linux dependencies
        run: |
          DEBIAN_FRONTEND=noninteractive apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y ca-certificates curl build-essential
          DEBIAN_FRONTEND=noninteractive apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev wget git
          
          # 安装 Node.js 20
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          DEBIAN_FRONTEND=noninteractive apt-get install -y nodejs

      - name: Download dependencies
        run: go mod download

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.9.1

      - name: Build
        run: wails build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/bin/browser-launcher

  build-macos:
    name: Build macOS
    runs-on: macos-14
    env:
      CGO_ENABLED: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download dependencies
        run: go mod download

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.9.1

      - name: Build
        run: wails build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: build/bin/browser-launcher.app

  release:
    name: Create Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir release
          if [ -f artifacts/windows-build/browser-launcher.exe ]; then
            cp artifacts/windows-build/browser-launcher.exe release/browser-launcher-windows.exe
          fi
          if [ -f artifacts/linux-build/browser-launcher ]; then
            cp artifacts/linux-build/browser-launcher release/browser-launcher-linux
            chmod +x release/browser-launcher-linux
          fi
          if [ -d artifacts/macos-build/browser-launcher.app ]; then
            cd artifacts/macos-build
            zip -r ../../release/browser-launcher-macos.zip browser-launcher.app
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
