name: Build Browser Launcher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 手动触发

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/bin/browser-launcher.exe

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          # 安装 webkit2gtk-4.0 以兼容麒麟系统
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build

      - name: Create DEB package
        run: |
          mkdir -p package/DEBIAN
          mkdir -p package/usr/bin
          mkdir -p package/usr/share/applications
          mkdir -p package/usr/share/icons/hicolor/256x256/apps
          
          # 复制可执行文件
          cp build/bin/browser-launcher package/usr/bin/
          chmod +x package/usr/bin/browser-launcher
          
          # 复制图标
          cp build/appicon.png package/usr/share/icons/hicolor/256x256/apps/browser-launcher.png
          
          # 创建 desktop 文件
          cat > package/usr/share/applications/browser-launcher.desktop << 'EOF'
          [Desktop Entry]
          Name=Browser Launcher
          Comment=Browser Launcher Application
          Exec=/usr/bin/browser-launcher
          Icon=browser-launcher
          Terminal=false
          Type=Application
          Categories=Network;WebBrowser;
          EOF
          
          # 创建控制文件
          cat > package/DEBIAN/control << 'EOF'
          Package: browser-launcher
          Version: 1.0.0
          Architecture: amd64
          Maintainer: gystudio88 <gystudio88@gmail.com>
          Description: Browser Launcher Application
           A cross-platform browser launcher built with Wails.
          Depends: libwebkit2gtk-4.0-37
          EOF
          
          # 构建 deb 包
          dpkg-deb --build package browser-launcher_1.0.0_amd64.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: browser-launcher_1.0.0_amd64.deb

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: build/bin/browser-launcher.app

  release:
    name: Create Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir release
          if [ -f artifacts/windows-build/browser-launcher.exe ]; then
            cp artifacts/windows-build/browser-launcher.exe release/browser-launcher-windows.exe
          fi
          if [ -f artifacts/linux-build/browser-launcher_1.0.0_amd64.deb ]; then
            cp artifacts/linux-build/browser-launcher_1.0.0_amd64.deb release/
          fi
          if [ -d artifacts/macos-build/browser-launcher.app ]; then
            cd artifacts/macos-build
            zip -r ../../release/browser-launcher-macos.zip browser-launcher.app
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
