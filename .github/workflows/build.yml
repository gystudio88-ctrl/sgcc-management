name: Build Browser Launcher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 手动触发

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/bin/browser-launcher.exe

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
          sudo ln -sf /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc || true

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build

      - name: Create DEB package
        run: |
          mkdir -p package/DEBIAN
          mkdir -p package/usr/bin
          mkdir -p package/usr/share/applications
          mkdir -p package/usr/share/icons/hicolor/256x256/apps
          
          # 复制可执行文件
          cp build/bin/browser-launcher package/usr/bin/
          chmod +x package/usr/bin/browser-launcher
          
          # 复制图标
          cp build/appicon.png package/usr/share/icons/hicolor/256x256/apps/browser-launcher.png
          
          # 创建 desktop 文件
          echo '[Desktop Entry]' > package/usr/share/applications/browser-launcher.desktop
          echo 'Name=Browser Launcher' >> package/usr/share/applications/browser-launcher.desktop
          echo 'Comment=Browser Launcher Application' >> package/usr/share/applications/browser-launcher.desktop
          echo 'Exec=/usr/bin/browser-launcher' >> package/usr/share/applications/browser-launcher.desktop
          echo 'Icon=browser-launcher' >> package/usr/share/applications/browser-launcher.desktop
          echo 'Terminal=false' >> package/usr/share/applications/browser-launcher.desktop
          echo 'Type=Application' >> package/usr/share/applications/browser-launcher.desktop
          echo 'Categories=Network;WebBrowser;' >> package/usr/share/applications/browser-launcher.desktop
          
          # 创建控制文件
          echo 'Package: browser-launcher' > package/DEBIAN/control
          echo 'Version: 1.0.0' >> package/DEBIAN/control
          echo 'Architecture: amd64' >> package/DEBIAN/control
          echo 'Maintainer: gystudio88 <gystudio88@gmail.com>' >> package/DEBIAN/control
          echo 'Description: Browser Launcher Application' >> package/DEBIAN/control
          echo ' A cross-platform browser launcher built with Wails.' >> package/DEBIAN/control
          echo '' >> package/DEBIAN/control
          echo 'Depends: libwebkit2gtk-4.1-0 (>= 2.40.0) | libwebkit2gtk-4.0-37 (>= 2.40.0)' >> package/DEBIAN/control
          
          # 构建 deb 包
          dpkg-deb --build package browser-launcher_1.0.0_amd64.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: browser-launcher_1.0.0_amd64.deb

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: build/bin/browser-launcher.app

  release:
    name: Create Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir release
          if [ -f artifacts/windows-build/browser-launcher.exe ]; then
            cp artifacts/windows-build/browser-launcher.exe release/browser-launcher-windows.exe
          fi
          if [ -f artifacts/linux-build/browser-launcher_1.0.0_amd64.deb ]; then
            cp artifacts/linux-build/browser-launcher_1.0.0_amd64.deb release/
          fi
          if [ -d artifacts/macos-build/browser-launcher.app ]; then
            cd artifacts/macos-build
            zip -r ../../release/browser-launcher-macos.zip browser-launcher.app
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
