<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>浏览器启动器</title>
    <style>
        :root {
            --bg: #0f0f14;
            --bg-subtle: #1a1a22;
            --bg-card: #202028;
            --border: #2a2a35;
            --text: #e4e4e7;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --danger: #ef4444;
            --success: #22c55e;
            --radius: 12px;
            --font-mono: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace;
        }
        
        /* 浅色主题 */
        :root.light-theme {
            --bg: #f8fafc;
            --bg-subtle: #f1f5f9;
            --bg-card: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }
        
        /* 隐藏滚动条 */
        ::-webkit-scrollbar {
            display: none;
        }
        
        * {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        #app {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* 标题栏 - 可拖动 */
        .app-titlebar {
            height: 40px;
            background: var(--bg-subtle);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            --wails-draggable: drag;
            user-select: none;
        }
        
        .app-titlebar-text {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }
        
        .window-traffic {
            display: flex;
            gap: 8px;
            --wails-draggable: no-drag;
        }
        
        .window-traffic div {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .window-traffic div:hover {
            opacity: 0.8;
        }
        
        /* 主内容区 */
        .app-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* 卡片样式 */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            width: 100%;
            max-width: 440px;
        }
        
        .card-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* 二维码容器 */
        .qr-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            background: #fff;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        
        #qrcode {
            width: 160px;
            height: 160px;
        }
        
        .random-code {
            font-size: 15px;
            font-weight: 700;
            color: var(--accent);
            font-family: var(--font-mono);
            letter-spacing: 1px;
        }
        
        /* 表单 */
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-subtle);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .form-input:focus {
            border-color: var(--accent);
        }
        
        .form-input::placeholder {
            color: var(--text-muted);
        }
        
        /* 按钮 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        
        .btn-primary:hover {
            background: var(--accent-hover);
        }
        
        .btn-full {
            width: 100%;
        }
        
        /* 错误提示 */
        .error-msg {
            color: var(--danger);
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            min-height: 20px;
        }
        
        /* 浏览器列表 */
        .browser-section {
            margin-top: 20px;
            width: 100%;
            max-width: 440px;
        }
        
        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        
        .browser-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .browser-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .browser-item:hover {
            border-color: var(--accent);
            background: var(--bg-subtle);
        }
        
        .browser-icon {
            font-size: 20px;
        }
        
        .browser-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
        }
        
        /* 状态栏 */
        .status-bar {
            margin-top: 16px;
            padding: 12px 16px;
            background: var(--bg-subtle);
            border-radius: 8px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
        }
        
        .status-bar.success {
            color: var(--success);
        }
        
        .status-bar.error {
            color: var(--danger);
        }
        
        /* 隐藏类 */
        .hidden {
            display: none !important;
        }
        
        /* 表单行 */
        .form-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .form-row .form-label {
            width: 50px;
            flex-shrink: 0;
            margin-bottom: 0;
        }
        
        .form-row .form-input {
            flex: 1;
        }
        
        /* 按钮行 */
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn-row .btn {
            flex: 1;
        }
    </style>
</head>
<body>
<div id="app">
    <!-- 标题栏 -->
    <div class="app-titlebar">
        <span class="app-titlebar-text" id="titlebar-text">验证</span>
        <div class="window-traffic">
            <div style="background: #28c840;" onclick="maximizeApp()"></div>
            <div style="background: #febc2e;" onclick="minimizeApp()"></div>
            <div style="background: #ff5f57;" onclick="closeApp()"></div>
        </div>
    </div>
    
    <!-- 主内容 -->
    <div class="app-content">
        <!-- 验证页面 -->
        <div id="verify-page" class="card">
            <div class="card-title">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0110 0v4"/>
                </svg>
                请扫描二维码获取验证码
            </div>
            
            <div class="qr-wrapper">
                <canvas id="qrcode"></canvas>
                <div id="random-code" class="random-code"></div>
            </div>
            
            <div class="form-group">
                <label class="form-label">验证码</label>
                <input type="text" id="verify-input" class="form-input" placeholder="请输入8位验证码" maxlength="8" autocomplete="off"/>
            </div>
            
            <div id="verify-error" class="error-msg"></div>
            
            <div class="btn-row">
                <button class="btn btn-primary btn-full" onclick="doVerify()">验证</button>
            </div>
        </div>
        
        <!-- 主页面 -->
        <div id="main-page" class="hidden" style="width: 100%; max-width: 440px;">
            <div class="card">
                <div class="card-title">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="2" y1="12" x2="22" y2="12"/>
                        <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
                    </svg>
                    浏览器启动器
                </div>
                
                <div class="form-row">
                    <label class="form-label">URL</label>
                    <input type="text" id="url-input" class="form-input" placeholder="输入链接..." autocomplete="off"/>
                </div>
                
                <div class="form-row">
                    <label class="form-label">IP</label>
                    <input type="text" id="ip-input" class="form-input" placeholder="输入 IP 地址..." autocomplete="off"/>
                </div>
            </div>
            
            <div class="browser-section">
                <div class="section-title">选择浏览器打开</div>
                <div id="browser-list" class="browser-list"></div>
            </div>
            
            <div id="status-bar" class="status-bar"></div>
        </div>
    </div>
</div>

<script src="./src/main.js" type="module"></script>
<script>
    // 根据时间自动切换主题
    function autoTheme() {
        const hour = new Date().getHours();
        // 6:00-18:00 为浅色主题，18:00-6:00 为深色主题
        if (hour >= 6 && hour < 18) {
            document.documentElement.classList.add('light-theme');
        } else {
            document.documentElement.classList.remove('light-theme');
        }
    }
    autoTheme();
    // 每分钟检查一次
    setInterval(autoTheme, 60000);
</script>
</body>
</html>
